<!DOCTYPE html>
<html>
<head>
    <title>Shamba Bora</title>
</head>
<body>

    <h1>🌱 Shamba Bora Dashboard</h1>

    <button onclick="getAdvice()">Get AI Advice</button>

    <p id="result"></p>

    <script>
        function getAdvice() {
            fetch("http://127.0.0.1:8000/api/ai-advice/")
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText = data.advice;
            });
        }
    </script>

</body>
</html>
